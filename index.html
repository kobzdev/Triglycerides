<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LipidCoach">
<meta name="mobile-web-app-capable" content="yes">
<title>LipidCoach</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ── PWA INSTALL BANNER ─────────────────────────────────────── */
#pwa-install-bar {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 448px;
  background: linear-gradient(135deg, #16a34a, #065f46);
  color: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(22,163,74,0.45);
  z-index: 9999;
  display: none;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  animation: slideUp 0.4s cubic-bezier(.34,1.56,.64,1) both;
}
#pwa-install-bar.visible { display: flex; }
@keyframes slideUp {
  from { opacity:0; transform: translateX(-50%) translateY(24px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}
#pwa-install-bar img { width: 40px; height: 40px; border-radius: 10px; flex-shrink:0; }
#pwa-install-bar .pwa-text { flex:1; }
#pwa-install-bar .pwa-text strong { display:block; font-size:14px; font-weight:700; }
#pwa-install-bar .pwa-text span { font-size:11px; opacity:.85; }
#pwa-btn-install {
  background: #fff;
  color: #16a34a;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#pwa-btn-dismiss {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
}
/* iOS manual install hint */
#ios-install-hint {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 448px;
  background: #1e293b;
  color: #f1f5f9;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 9999;
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 16px;
  font-size: 13px;
  animation: slideUp 0.4s cubic-bezier(.34,1.56,.64,1) both;
}
#ios-install-hint.visible { display: flex; }
#ios-install-hint .ios-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: #94a3b8;
  font-size: 20px; cursor: pointer;
}
#ios-install-hint strong { font-size: 14px; color: #fff; }
#ios-install-hint ol { margin: 4px 0 0 16px; padding: 0; line-height: 1.8; color: #cbd5e1; }
</style>

</script>
<style>
:root {
  --g50:#f0fdf4;--g100:#dcfce7;--g200:#bbf7d0;--g300:#86efac;--g400:#4ade80;
  --g500:#22c55e;--g600:#16a34a;--g700:#15803d;--g800:#166534;--g900:#14532d;
  --glass-bg:rgba(255,255,255,0.12);--glass-border:rgba(255,255,255,0.25);
  --card-bg:rgba(255,255,255,0.85);--card-border:rgba(255,255,255,0.6);
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --surface:#f8fafc;--surface2:#f1f5f9;
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
.dark {
  --glass-bg:rgba(15,23,42,0.7);--glass-border:rgba(255,255,255,0.1);
  --card-bg:rgba(15,23,42,0.85);--card-border:rgba(255,255,255,0.08);
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#475569;
  --surface:#0f172a;--surface2:#1e293b;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--surface);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  transition:background 0.3s,color 0.3s;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:linear-gradient(135deg,#dcfce7 0%,#f0fdf4 40%,#e0f2fe 100%);
  transition:background 0.3s;
}
.dark body::before{background:linear-gradient(135deg,#0f172a 0%,#0c1a0f 40%,#0f172a 100%);}
.dark body::before{background:linear-gradient(135deg,#052e16 0%,#0f172a 50%,#0c1130 100%);}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
.page{flex:1;padding:0 0 80px 0;overflow-y:auto;}
.page-inner{padding:16px;}

/* Nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--card-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--card-border);
  display:flex;z-index:100;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,0.06);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px 2px;
  color:var(--text-muted);font-size:10px;font-weight:600;
  letter-spacing:0.02em;transition:all 0.2s;border-radius:var(--radius-xs);
}
.nav-btn.active{color:var(--g600);}
.nav-btn svg{width:22px;height:22px;transition:transform 0.2s;}
.nav-btn.active svg{transform:scale(1.15);}

/* Header */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 8px;position:sticky;top:0;z-index:50;
  background:transparent;
}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:1px;}

/* Cards */
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:all 0.2s;
}
.card:active{transform:scale(0.99);}
.card-sm{border-radius:var(--radius-sm);padding:12px;}
.glass{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}

/* Score ring */
.score-ring-wrap{position:relative;width:120px;height:120px;}
.score-ring-wrap svg{transform:rotate(-90deg);}
.score-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.score-number{font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1;}
.score-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.05em;margin-top:2px;}

/* Progress bar */
.progress-wrap{background:var(--surface2);border-radius:999px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);}

/* Checklist */
.check-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--card-border);
}
.check-item:last-child{border-bottom:none;}
.check-box{
  width:24px;height:24px;border-radius:8px;border:2px solid var(--text-muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.2s;flex-shrink:0;
}
.check-box.checked{background:var(--g600);border-color:var(--g600);}
.check-label{font-size:14px;font-weight:500;flex:1;}
.check-label.done{text-decoration:line-through;color:var(--text-muted);}

/* Tag pills */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.tag-green{background:rgba(34,197,94,0.15);color:var(--g600);}
.tag-amber{background:rgba(245,158,11,0.15);color:#b45309;}
.tag-red{background:rgba(239,68,68,0.15);color:var(--red);}

/* Water bottle */
.water-bottle{
  width:80px;height:160px;border:3px solid rgba(59,130,246,0.5);
  border-radius:16px 16px 20px 20px;position:relative;overflow:hidden;
  margin:0 auto;
}
.water-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(96,165,250,0.6),rgba(37,99,235,0.8));
  transition:height 0.8s cubic-bezier(0.34,1.2,0.64,1);
}
.water-waves{
  position:absolute;top:-4px;left:-10px;right:-10px;height:8px;
  background:rgba(147,197,253,0.8);border-radius:50%;
  animation:wave 2s ease-in-out infinite;
}
@keyframes wave{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;gap:10px;padding:8px 0;}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;}
.chat-user{
  align-self:flex-end;
  background:var(--g600);color:#fff;
  border-bottom-right-radius:4px;
}
.chat-ai{
  align-self:flex-start;
  background:var(--card-bg);border:1px solid var(--card-border);
  color:var(--text-primary);border-bottom-left-radius:4px;
}
.chat-typing{display:flex;gap:4px;padding:12px 16px;}
.chat-dot{width:8px;height:8px;background:var(--text-muted);border-radius:50%;animation:bounce 1.4s ease-in-out infinite;}
.chat-dot:nth-child(2){animation-delay:0.2s;}
.chat-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all 0.15s;
}
.btn-primary{background:var(--g600);color:#fff;}
.btn-primary:active{background:var(--g700);transform:scale(0.98);}
.btn-outline{background:transparent;border:1.5px solid var(--g600);color:var(--g600);}
.btn-ghost{background:transparent;border:none;color:var(--text-secondary);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--radius-xs);}
.btn-full{width:100%;}

/* Input */
.input{
  width:100%;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--card-border);background:var(--card-bg);
  color:var(--text-primary);font-size:14px;outline:none;
  transition:border-color 0.2s;
}
.input:focus{border-color:var(--g500);}

/* Food item */
.food-item{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--card-border);cursor:pointer;transition:all 0.15s;
}
.food-item:last-child{border-bottom:none;}
.food-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--surface2);flex-shrink:0;
}
.food-meta{flex:1;}
.food-name{font-size:14px;font-weight:600;}
.food-cals{font-size:12px;color:var(--text-muted);}
.food-macros{display:flex;gap:8px;margin-top:2px;}
.macro{font-size:10px;color:var(--text-muted);font-weight:600;}

/* Achievement badge */
.badge{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;border-radius:var(--radius-sm);
  background:var(--card-bg);border:1px solid var(--card-border);
  text-align:center;
}
.badge-icon{font-size:32px;}
.badge-name{font-size:11px;font-weight:700;color:var(--text-secondary);}
.badge.locked{opacity:0.4;filter:grayscale(1);}

/* Stat box */
.stat-box{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 12px;
  display:flex;flex-direction:column;gap:4px;
}
.stat-value{font-size:24px;font-weight:900;letter-spacing:-0.5px;}
.stat-unit{font-size:11px;font-weight:700;color:var(--text-muted);}
.stat-label{font-size:12px;color:var(--text-muted);}

/* Insight card */
.insight{
  display:flex;gap:12px;padding:12px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);align-items:flex-start;
}
.insight-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.insight-text{font-size:13px;line-height:1.5;color:var(--text-secondary);}
.insight-text strong{color:var(--text-primary);}

/* Risk score */
.risk-bar-wrap{display:flex;flex-direction:column;gap:6px;}
.risk-bar-row{display:flex;align-items:center;gap:10px;}
.risk-bar-label{font-size:12px;font-weight:600;color:var(--text-secondary);width:80px;flex-shrink:0;}
.risk-bar{flex:1;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden;}
.risk-fill{height:100%;border-radius:999px;}

/* Lab entry */
.lab-entry{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--card-border);
}
.lab-entry:last-child{border-bottom:none;}

/* Chart canvas */
.chart-wrap{position:relative;width:100%;height:200px;}

/* Toggle */
.toggle{
  position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;
}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{
  position:absolute;cursor:pointer;inset:0;background:#cbd5e1;
  border-radius:999px;transition:0.3s;
}
.toggle-slider::before{
  content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:0.3s;
}
.toggle input:checked + .toggle-slider{background:var(--g600);}
.toggle input:checked + .toggle-slider::before{transform:translateX(20px);}

/* Chip select */
.chip-group{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;
  border:1.5px solid var(--card-border);background:var(--card-bg);
  color:var(--text-secondary);transition:all 0.15s;
}
.chip.active{background:var(--g600);color:#fff;border-color:var(--g600);}

/* Section label */
.section-label{font-size:11px;font-weight:800;letter-spacing:0.08em;color:var(--text-muted);text-transform:uppercase;margin:16px 0 8px;}

/* Divider */
.divider{height:1px;background:var(--card-border);margin:12px 0;}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#0f172a;color:#fff;padding:10px 18px;border-radius:999px;
  font-size:13px;font-weight:600;z-index:999;
  animation:toastIn 0.3s ease,toastOut 0.3s ease 2.2s forwards;
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* Loading */
.loading{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px;color:var(--text-muted);font-size:13px;
}

/* Meal plan card */
.meal-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px;
}
.meal-type{font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--g600);}
.meal-name{font-size:16px;font-weight:700;margin:4px 0 8px;}
.meal-items{display:flex;flex-wrap:wrap;gap:5px;}
.meal-item-chip{background:rgba(34,197,94,0.12);color:var(--g700);padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}

/* Exercise ring */
.ex-ring{position:relative;width:80px;height:80px;flex-shrink:0;}
.ex-ring svg{transform:rotate(-90deg);}
.ex-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ex-num{font-size:18px;font-weight:900;}
.ex-unit{font-size:9px;color:var(--text-muted);font-weight:700;}

/* Scroll */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:2px;}

/* Animated gradient hero */
.hero-gradient{
  background:linear-gradient(135deg,var(--g600),var(--g400),#06b6d4);
  background-size:200% 200%;
  animation:gradientShift 6s ease infinite;
}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Fade in */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.4s ease forwards;}

.text-green{color:var(--g600);}

.fw-700{font-weight:700;}

function ScoreRing({ score, size=120, stroke=10 }) {

  return React.createElement('div', { className: 'score-ring-wrap', style: { width: size, height: size } },
    React.createElement('svg', { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
      React.createElement('circle', { cx: size/2, cy: size/2, r, fill: 'none', stroke: 'var(--surface2)', strokeWidth: stroke }),
      React.createElement('circle', { cx: size/2, cy: size/2, r, fill: 'none', stroke: color, strokeWidth: stroke, strokeDasharray: circ, strokeDashoffset: fill, strokeLinecap: 'round', style: { transition: 'stroke-dashoffset 1s cubic-bezier(0.34,1.2,0.64,1)' } }),

function ImpactTag({ impact }) {

function AICoach() {
  const [msgs, setMsgs] = useState([
    { role: 'ai', text: "Hi Kobi! I'm your AI Nutrition Coach 🥗\n\nI know your triglycerides are at 369 mg/dL. I'm here to help you eat smarter. Ask me anything:\n• Can I eat lechon?\n• What to order at Jollibee?\n• Is mango okay?\n• What to eat after basketball?" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const quickQ = ['Can I eat lechon?', 'What to order at Jollibee?', 'Is mango okay?', 'What to eat after basketball?'];

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, loading]);

  const sendMsg = async (text) => {
    if (!text.trim()) return;
    const userMsg = { role: 'user', text };
    setMsgs(p => [...p, userMsg]);
    setInput('');
    setLoading(true);

    await new Promise(r => setTimeout(r, 800 + Math.random() * 600));

    // Try Anthropic API
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: `You are LipidCoach AI, a nutrition expert specializing in lowering triglycerides. 
The user is Kobi, 26 years old, Filipino, with triglycerides at 369 mg/dL (very high, normal <150). 
He takes Omacor fish oil. He works from home and is sedentary.
Give concise, practical Filipino-friendly food advice. Use emojis. Be warm but direct.
Always connect advice back to triglycerides. Suggest Filipino food alternatives when possible.`,
          messages: [{ role: 'user', content: text }]
        })
      });
      if (res.ok) {
        const data = await res.json();
        const aiText = data.content?.[0]?.text || getAIResponse(text);
        setMsgs(p => [...p, { role: 'ai', text: aiText }]);
        setLoading(false);
        return;
      }
    } catch {}

    setMsgs(p => [...p, { role: 'ai', text: getAIResponse(text) }]);
    setLoading(false);
  };

  const formatText = (t) => t.split('\n').map((line, i) =>
    React.createElement('span', { key: i }, line, i < t.split('\n').length - 1 ? React.createElement('br') : null)
  );

  return React.createElement('div', { className: 'page', style: { display: 'flex', flexDirection: 'column' } },
    React.createElement('div', { className: 'page-header' },
      React.createElement('div', null,
        React.createElement('div', { className: 'page-title' }, '🥗 AI Coach'),
        React.createElement('div', { className: 'page-subtitle' }, 'Personalized nutrition for your lipid goals')
      )
    ),
    React.createElement('div', { style: { flex: 1, overflowY: 'auto', padding: '0 16px' } },
      // Quick questions
      React.createElement('div', { className: 'chip-group', style: { marginBottom: 12, flexWrap: 'wrap' } },
        quickQ.map((q, i) => React.createElement('div', { key: i, className: 'chip', onClick: () => sendMsg(q), style: { fontSize: 11 } }, q))
      ),

      React.createElement('div', { className: 'chat-wrap' },
        msgs.map((m, i) =>
          React.createElement('div', { key: i, className: `chat-msg ${m.role === 'user' ? 'chat-user' : 'chat-ai'}` },
            formatText(m.text)
          )
        ),
        loading && React.createElement('div', { className: 'chat-ai chat-msg' },
          React.createElement('div', { className: 'chat-typing' },
            [0,1,2].map(i => React.createElement('div', { key: i, className: 'chat-dot', style: { animationDelay: i*0.2+'s' } }))
          )
        ),
        React.createElement('div', { ref: bottomRef })
      )
    ),

    React.createElement('div', { style: { padding: '12px 16px', background: 'var(--card-bg)', borderTop: '1px solid var(--card-border)', backdropFilter: 'blur(20px)' } },
      React.createElement('div', { className: 'flex gap-8' },
        React.createElement('input', {
          className: 'input', placeholder: 'Ask about any food...',
          value: input, onChange: e => setInput(e.target.value),
          onKeyPress: e => e.key === 'Enter' && sendMsg(input),

          React.createElement('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, todayEx.map(e => `${e.type} ${e.mins}m`).join(' · '))
        )
      ),

      // Sleep Tracker
      React.createElement('div', { className: 'section-label' }, '😴 Sleep Tracker'),
      React.createElement('div', { className: 'card', style: { marginBottom: 16 } },
        React.createElement('div', { className: 'flex items-center gap-8', style: { marginBottom: 12 } },
          React.createElement('div', { style: { fontSize: 40 } }, '🌙'),
          React.createElement('div', null,
            React.createElement('div', { style: { fontSize: 28, fontWeight: 900 } }, sleepHours + 'h'),
            React.createElement('div', { style: { fontSize: 12, color: 'var(--text-muted)' } }, 'Last night · Goal: 7-9h'),
            React.createElement('span', { className: `tag ${sleepHours >= 7 && sleepHours <= 9 ? 'tag-green' : 'tag-amber'}` },
              sleepHours >= 7 && sleepHours <= 9 ? '🟢 Optimal' : sleepHours < 7 ? '🔴 Too little' : '🟡 Too much'
            )
          )
        ),
        React.createElement('input', {
          type: 'range', min: 4, max: 12, step: 0.5, value: sleepHours,
          onChange: e => { const v = +e.target.value; setSleepHours(v); saveState('sleep', v); },
          style: { width: '100%', accentColor: '#8b5cf6' }
        }),
        React.createElement('div', { className: 'flex justify-between', style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 4 } },
          React.createElement('span', null, '4h'), React.createElement('span', null, '8h'), React.createElement('span', null, '12h')
        ),
        React.createElement('div', { style: { marginTop: 12, padding: '10px 12px', background: 'rgba(139,92,246,0.08)', borderRadius: 10, fontSize: 12, color: 'var(--text-secondary)' } },
          '💡 Poor sleep raises cortisol, which increases triglycerides. Aim for consistent 7-8h sleep to support your lipid goals.'
        )
      ),

      // Meal Planner
      React.createElement('div', { className: 'section-label' }, '🥗 Meal Planner'),
      React.createElement('div', { style: { marginBottom: 8, display: 'flex', gap: 8, alignItems: 'center' } },
        React.createElement('div', { style: { fontSize: 13, color: 'var(--text-secondary)', flex: 1 } }, 'Optimized for triglyceride reduction'),
        React.createElement('button', { className: 'btn btn-outline btn-sm', onClick: () => setMealDay(d => d + 1) }, '🔄 New Plan')
      ),
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 } },
        ['🌅 Breakfast', '☀️ Lunch', '🌙 Dinner', '🍎 Snack'].map((label, i) =>
          React.createElement('div', { key: i, className: 'meal-card' },
            React.createElement('div', { className: 'meal-type' }, label),
            React.createElement('div', { className: 'meal-name' }, meals[i].name),
            React.createElement('div', { className: 'meal-items' },
              meals[i].items.map((item, j) =>
                React.createElement('div', { key: j, className: 'meal-item-chip' }, item)
              )
            ),
            React.createElement('div', { style: { marginTop: 8, display: 'flex', gap: 8, alignItems: 'center' } },
              React.createElement('span', { style: { fontSize: 12, color: 'var(--text-muted)' } }, meals[i].cal + ' kcal'),
              React.createElement(ImpactTag, { impact: meals[i].tgEffect })
            )
          )
        )
      )
    )
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState('home');
  const [darkMode, setDarkMode] = useState(() => loadState('dark', false));

  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    saveState('dark', darkMode);
  }, [darkMode]);

  const tabs = [
    { id: 'home', label: 'Dashboard', icon: Icon.home },
    { id: 'food', label: 'Food', icon: Icon.food },
    { id: 'coach', label: 'AI Coach', icon: Icon.chat },
    { id: 'stats', label: 'Analytics', icon: Icon.chart },
    { id: 'more', label: 'Tools', icon: Icon.more },
  ];

  const renderPage = () => {
    switch (tab) {
      case 'home': return React.createElement(Dashboard, { darkMode, setDarkMode });
      case 'food': return React.createElement(FoodTracker);
      case 'coach': return React.createElement(AICoach);
      case 'stats': return React.createElement(Analytics);
      case 'more': return React.createElement(MorePage);
    }
  };

  return React.createElement('div', { id: 'app' },
    renderPage(),
    React.createElement('nav', { className: 'bottom-nav' },
      tabs.map(t =>
        React.createElement('button', { key: t.id, className: `nav-btn ${tab === t.id ? 'active' : ''}`, onClick: () => setTab(t.id) },
          React.createElement('div', { style: { width: 22, height: 22 } }, t.icon),
          t.label
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>

<div id="pwa-install-bar">

  <div class="pwa-text">
    <strong>Install LipidCoach</strong>
    <span>Works offline &middot; No app store needed</span>
  </div>
  <button id="pwa-btn-install">Install</button>

</div>

<!-- iOS INSTALL HINT -->
<div id="ios-install-hint">
  <button class="ios-close" id="ios-close-btn">&#x2715;</button>
  <strong>&#128242; Install LipidCoach on iPhone</strong>
  <ol>
    <li>Tap the <strong>Share</strong> button at the bottom of Safari</li>
    <li>Tap <strong>"Add to Home Screen"</strong></li>
    <li>Tap <strong>Add</strong> &mdash; opens like a real app!</li>
  </ol>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) { console.log('SW registered:', reg.scope); })
      .catch(function(err) { console.error('SW error:', err); });
  });
}

var deferredPrompt = null;
var installBar  = document.getElementById('pwa-install-bar');
var installBtn  = document.getElementById('pwa-btn-install');
var dismissBtn  = document.getElementById('pwa-btn-dismiss');
var iosHint     = document.getElementById('ios-install-hint');
var iosCloseBtn = document.getElementById('ios-close-btn');

var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
var isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

if (!isStandalone) {
  if (isIOS) {
    if (!sessionStorage.getItem('ios-hint-shown')) {
      setTimeout(function() {
        iosHint.classList.add('visible');
        sessionStorage.setItem('ios-hint-shown', '1');
      }, 2000);
    }
  } else {
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('pwa-dismissed')) {
        installBar.classList.add('visible');
      }
    });
  }
}

installBtn.addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(result) {
    deferredPrompt = null;
    installBar.classList.remove('visible');
  });
});

dismissBtn.addEventListener('click', function() {
  installBar.classList.remove('visible');
  localStorage.setItem('pwa-dismissed', '1');
});

iosCloseBtn.addEventListener('click', function() {
  iosHint.classList.remove('visible');
});

window.addEventListener('appinstalled', function() {
  installBar.classList.remove('visible');
  deferredPrompt = null;
});
</script>
</body>
